# Grafana Dashboard Provisioning
# Auto-loads dashboards from the specified directory on startup

apiVersion: 1

providers:
  - name: 'TeamSync'
    orgId: 1
    folder: 'TeamSync'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
