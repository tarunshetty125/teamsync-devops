# ─────────────────────────────────────────────────────────────
# Nginx Reverse Proxy Configuration
# Routes public traffic to client and backend over HTTPS
# ─────────────────────────────────────────────────────────────

# Upstream definitions
upstream client {
    server client:80;
}

upstream backend {
    server backend:8000;
}

upstream grafana {
    server grafana:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name teamsyncin.duckdns.org localhost;

    # ─── Nginx Status (internal Docker monitoring only) ───
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name teamsyncin.duckdns.org localhost;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ─── Security Headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Backend Metrics (internal Docker monitoring only) ─
    location = /api/metrics {
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
        proxy_pass http://backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API Proxy (Backend) ──────────────────────────────
    # Routes /api/* requests to the Node.js backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── Socket.IO Realtime Proxy (Backend) ───────────────
    # Preserve /socket.io/* so WebSocket upgrades reach Express/Socket.IO.
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ─── Grafana Dashboard Proxy ──────────────────────────
    # Grafana remains internal to Docker and is exposed only behind HTTPS.
    location /grafana/api/live/ {
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /grafana/ {
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─── Client (React App) ───────────────────────────────
    # All other requests go to the React client
    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Nginx Status (for monitoring) ────────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
    }

    # ─── Error Pages ──────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
