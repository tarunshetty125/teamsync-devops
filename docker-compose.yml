# ─────────────────────────────────────────────────────────────
# Docker Compose - TeamSync DevOps Pipeline
#
# Services:
#   1. client    - React app served by Nginx (port 80)
#   2. backend   - Node.js Express API (port 8000)
#   3. nginx     - Reverse proxy (ports 80/443)
#   4. prometheus - Internal metrics collection
#   5. grafana   - Internal metrics dashboard
# ─────────────────────────────────────────────────────────────

services:
  # ─── Client (React + Vite + TypeScript) ──────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://teamsyncin.duckdns.org/api/v1}
    container_name: teamsync-client
    restart: unless-stopped
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend (Node.js + Express + TypeScript) ────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MONGO_URI=${MONGO_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_EXPIRES_IN=${SESSION_EXPIRES_IN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - FRONTEND_GOOGLE_CALLBACK_URL=${FRONTEND_GOOGLE_CALLBACK_URL}
      - LOCAL_FILE_STORAGE_DIR=${LOCAL_FILE_STORAGE_DIR:-/app/uploads}
      - MAX_ATTACHMENT_BYTES=${MAX_ATTACHMENT_BYTES:-10485760}
      - MAX_AVATAR_BYTES=${MAX_AVATAR_BYTES:-2097152}
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: teamsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/prometheus.htpasswd:/etc/nginx/prometheus.htpasswd:ro
      - ${TLS_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      client:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - teamsync-network

  # ─── Prometheus (Metrics Collection) ────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: teamsync-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.external-url=https://teamsyncin.duckdns.org/prometheus/'
      - '--web.route-prefix=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - teamsync-network

  # ─── Nginx Prometheus Exporter ──────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: teamsync-nginx-exporter
    restart: unless-stopped
    expose:
      - "9113"
    command:
      - '--nginx.scrape-uri=http://nginx/nginx_status'
    depends_on:
      - nginx
    networks:
      - teamsync-network

  # ─── Grafana (Metrics Dashboard) ────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: teamsync-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://teamsyncin.duckdns.org/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - teamsync-network

# ─── Networks ─────────────────────────────────────────────
networks:
  teamsync-network:
    driver: bridge
    name: teamsync-network

# ─── Volumes ─────────────────────────────────────────────
volumes:
  backend-uploads:
    name: teamsync-backend-uploads
  prometheus-data:
    name: teamsync-prometheus-data
  grafana-data:
    name: teamsync-grafana-data
