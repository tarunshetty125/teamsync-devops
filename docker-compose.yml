# ─────────────────────────────────────────────────────────────
# Docker Compose - TeamSync DevOps Pipeline
#
# Services:
#   1. client    - React app served by Nginx (port 80)
#   2. backend   - Node.js Express API (port 8000)
#   3. nginx     - Reverse proxy (port 80 → host:80)
#   4. prometheus - Metrics collection (port 9090)
#   5. grafana   - Metrics dashboard (port 3001)
# ─────────────────────────────────────────────────────────────

services:
  # ─── Client (React + Vite + TypeScript) ──────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://teamsyncin.duckdns.org/api/v1}
    container_name: teamsync-client
    restart: unless-stopped
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend (Node.js + Express + TypeScript) ────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MONGO_URI=${MONGO_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_EXPIRES_IN=${SESSION_EXPIRES_IN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - FRONTEND_GOOGLE_CALLBACK_URL=${FRONTEND_GOOGLE_CALLBACK_URL}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: teamsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      client:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - teamsync-network

  # ─── Prometheus (Metrics Collection) ────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: teamsync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - teamsync-network

  # ─── Grafana (Metrics Dashboard) ────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: teamsync-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - teamsync-network

# ─── Networks ─────────────────────────────────────────────
networks:
  teamsync-network:
    driver: bridge
    name: teamsync-network

# ─── Volumes ─────────────────────────────────────────────
volumes:
  prometheus-data:
    name: teamsync-prometheus-data
  grafana-data:
    name: teamsync-grafana-data
