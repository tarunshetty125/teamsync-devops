# ─────────────────────────────────────────────────────────────
# Docker Compose - TeamSync DevOps Pipeline
#
# Services:
#   1. frontend  - React app served by Nginx (port 80)
#   2. backend   - Node.js Express API (port 5006)
#   3. nginx     - Reverse proxy (port 80 → host:80)
#   4. prometheus - Metrics collection (port 9090)
#   5. grafana   - Metrics dashboard (port 3001)
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ─── Frontend (React + Vite) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamsync-frontend
    restart: unless-stopped
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend (Node.js + Express) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5006
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - teamsync-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5006/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: teamsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - teamsync-network

  # ─── Prometheus (Metrics Collection) ────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: teamsync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - teamsync-network

  # ─── Grafana (Metrics Dashboard) ────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: teamsync-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - teamsync-network

# ─── Networks ─────────────────────────────────────────────
networks:
  teamsync-network:
    driver: bridge
    name: teamsync-network

# ─── Volumes ─────────────────────────────────────────────
volumes:
  prometheus-data:
    name: teamsync-prometheus-data
  grafana-data:
    name: teamsync-grafana-data
