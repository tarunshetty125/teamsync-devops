# ─────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Builds, tests, and deploys TeamSync to AWS EC2
# ─────────────────────────────────────────────────────────────

name: TeamSync CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            backend/package-lock.json

      # ─── Backend Build & Test ───────────────────────────
      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔨 Build Backend (TypeScript)
        working-directory: ./backend
        run: npm run build

      - name: 🔎 Backend Dependency Audit
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: 🧪 Run Backend Unit Tests
        working-directory: ./backend
        run: npm run test

      - name: 🎭 Run Backend Playwright E2E
        working-directory: ./backend
        run: npm run test:e2e

      # ─── Client Build & Test ────────────────────────────
      - name: 📦 Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: 🔎 Client Dependency Audit
        working-directory: ./client
        run: npm audit --audit-level=high

      - name: 🧪 Run Client Linting
        working-directory: ./client
        run: npm run lint

      - name: 🔨 Build Client
        working-directory: ./client
        run: npm run build

      - name: ✅ Build Verification
        run: |
          echo "✅ Client build successful"
          echo "✅ Backend build successful"
          echo "✅ All checks passed"

  # ─── Job 2: Docker Build ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Client Docker Image
        run: |
          docker build -t teamsync-client:${{ github.sha }} ./client
          echo "✅ Client image built"

      - name: 🏗️ Build Backend Docker Image
        run: |
          docker build -t teamsync-backend:${{ github.sha }} ./backend
          echo "✅ Backend image built"

      - name: 🐳 Docker Compose Validation
        run: docker compose config --quiet && echo "✅ Docker Compose config is valid"

  # ─── Job 3: Deploy to AWS EC2 ──────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            trap 'echo "❌ Deployment failed on line ${LINENO}" >&2' ERR

            APP_DIR="/home/ubuntu/teamsync-devops"
            TLS_CERT_PATH="/etc/letsencrypt/live/teamsyncin.duckdns.org/fullchain.pem"
            TLS_KEY_PATH="/etc/letsencrypt/live/teamsyncin.duckdns.org/privkey.pem"

            echo "─── Deployment Preflight ───"
            test "$(whoami)" = "ubuntu"
            test -d "${APP_DIR}"
            cd "${APP_DIR}"
            test -f docker-compose.yml
            git config --global --add safe.directory "${APP_DIR}" || true
            docker --version
            docker compose version
            id -nG ubuntu | tr ' ' '\n' | grep -qx docker
            docker info >/dev/null

            echo "─── Pull Latest Code ───"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            test -f docker-compose.yml
            docker compose -f docker-compose.yml config --quiet

            echo "─── Create Runtime .env ───"
            cat > .env <<'ENV_FILE'
            MONGO_URI=${{ secrets.MONGO_URI }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SESSION_EXPIRES_IN=${{ secrets.SESSION_EXPIRES_IN }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
            FRONTEND_GOOGLE_CALLBACK_URL=${{ secrets.FRONTEND_GOOGLE_CALLBACK_URL }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            TLS_CERT_PATH=/etc/letsencrypt/live/teamsyncin.duckdns.org/fullchain.pem
            TLS_KEY_PATH=/etc/letsencrypt/live/teamsyncin.duckdns.org/privkey.pem
            GF_ADMIN_USER=${{ secrets.GF_ADMIN_USER }}
            GF_ADMIN_PASSWORD=${{ secrets.GF_ADMIN_PASSWORD }}
            ENV_FILE
            chmod 600 .env
            test -s .env
            for required_key in \
              MONGO_URI \
              SESSION_SECRET \
              SESSION_EXPIRES_IN \
              GOOGLE_CLIENT_ID \
              GOOGLE_CLIENT_SECRET \
              GOOGLE_CALLBACK_URL \
              FRONTEND_ORIGIN \
              FRONTEND_GOOGLE_CALLBACK_URL \
              VITE_API_BASE_URL \
              TLS_CERT_PATH \
              TLS_KEY_PATH \
              GF_ADMIN_USER \
              GF_ADMIN_PASSWORD
            do
              grep -Eq "^${required_key}=.+$" .env
            done

            echo "─── Verify TLS Certificates ───"
            test -s "${TLS_CERT_PATH}"
            test -s "${TLS_KEY_PATH}"
            if command -v openssl >/dev/null 2>&1; then
              openssl x509 -in "${TLS_CERT_PATH}" -noout -subject -issuer -dates
            fi

            echo "─── Build And Restart Containers ───"
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate --remove-orphans

            echo "─── Wait For Healthy Containers ───"
            for attempt in {1..36}; do
              backend_health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' teamsync-backend)"
              client_health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' teamsync-client)"
              if [ "${backend_health}" = "healthy" ] && [ "${client_health}" = "healthy" ]; then
                echo "✅ Backend and client are healthy"
                break
              fi
              if [ "${attempt}" -eq 36 ]; then
                docker compose ps
                docker logs --tail=120 teamsync-backend
                docker logs --tail=120 teamsync-client
                echo "❌ Containers did not become healthy" >&2
                exit 1
              fi
              echo "Waiting for health checks... backend=${backend_health}, client=${client_health}"
              sleep 5
            done

            echo "─── Verify Deployment Health ───"
            docker compose ps
            curl -fsSk https://localhost/api/health
            curl -fsSk https://localhost/ >/dev/null
            redirect_location="$(curl -fsSI http://localhost/ | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')"
            test "${redirect_location}" = "https://localhost/"

            echo "─── Cleanup Old Docker Images ───"
            docker image prune -f || echo "⚠️ Docker image prune failed; deployment is already healthy"

            echo "✅ Deployment complete!"

      - name: 🏥 Post-Deployment Health Check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            APP_DIR="/home/ubuntu/teamsync-devops"
            test -d "${APP_DIR}"
            test -f "${APP_DIR}/docker-compose.yml"
            cd "${APP_DIR}"

            echo "─── Container Status ───"
            docker compose -f docker-compose.yml ps
            echo ""
            echo "─── Health Check ───"
            health_response="$(curl -fsSk https://localhost/api/health)"
            echo "${health_response}" | head -c 200
            echo ""
            curl -fsSk https://localhost/ >/dev/null
            redirect_location="$(curl -fsSI http://localhost/ | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' | tr -d '\r')"
            test "${redirect_location}" = "https://localhost/"
            echo ""
            echo "✅ All systems operational"
