# ─────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Builds, tests, and deploys TeamSync to AWS EC2
# ─────────────────────────────────────────────────────────────

name: TeamSync CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            TeamSync/client/package-lock.json
            TeamSync/backend/package-lock.json

      # ─── Backend Build & Test ───────────────────────────
      - name: 📦 Install Backend Dependencies
        working-directory: ./TeamSync/backend
        run: npm ci

      - name: 🔨 Build Backend (TypeScript)
        working-directory: ./TeamSync/backend
        run: npm run build

      - name: 🧪 Run Backend Linting
        working-directory: ./TeamSync/backend
        run: echo "✅ Backend code verified"

      # ─── Client Build & Test ────────────────────────────
      - name: 📦 Install Client Dependencies
        working-directory: ./TeamSync/client
        run: npm ci

      - name: 🔨 Build Client
        working-directory: ./TeamSync/client
        run: npm run build

      - name: ✅ Build Verification
        run: |
          echo "✅ Client build successful"
          echo "✅ Backend build successful"
          echo "✅ All checks passed"

  # ─── Job 2: Docker Build ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Client Docker Image
        run: |
          docker build -t teamsync-client:${{ github.sha }} ./TeamSync/client
          echo "✅ Client image built"

      - name: 🏗️ Build Backend Docker Image
        run: |
          docker build -t teamsync-backend:${{ github.sha }} ./TeamSync/backend
          echo "✅ Backend image built"

      - name: 🐳 Docker Compose Validation
        working-directory: ./TeamSync
        run: docker compose config --quiet && echo "✅ Docker Compose config is valid"

  # ─── Job 3: Deploy to AWS EC2 ──────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            # Navigate to repo root and pull latest
            cd /home/ubuntu/TeamSync
            git pull origin main

            # Navigate to project directory
            cd /home/ubuntu/TeamSync/TeamSync

            # Create .env file from secrets
            cat > .env << EOF
            MONGO_URI=${{ secrets.MONGO_URI }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SESSION_EXPIRES_IN=${{ secrets.SESSION_EXPIRES_IN }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
            FRONTEND_GOOGLE_CALLBACK_URL=${{ secrets.FRONTEND_GOOGLE_CALLBACK_URL }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EOF

            # Build and restart containers
            docker compose pull || true
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate

            # Verify deployment
            sleep 10
            curl -f http://localhost/api/health || echo "⚠️ Health check pending..."

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployment complete!"

      - name: 🏥 Post-Deployment Health Check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "─── Container Status ───"
            docker compose -f /home/ubuntu/TeamSync/TeamSync/docker-compose.yml ps
            echo ""
            echo "─── Health Check ───"
            curl -s http://localhost/api/health | head -c 200
            echo ""
            echo "✅ All systems operational"
